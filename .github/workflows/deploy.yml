name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: docker build -t habla-anomia-deploy -f Dockerfile.dev .

      - name: Build application
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          CONTAINER=$(docker create -e BASE_PATH=/habla-anomia -e GIT_HASH=$SHORT_SHA habla-anomia-deploy npm run build)
          docker start -a $CONTAINER
          docker cp $CONTAINER:/app/build ./build
          docker rm $CONTAINER

      - name: Prepare for GitHub Pages
        run: |
          # GitHub Pages needs index.html, but SvelteKit SPA outputs 200.html
          cp build/200.html build/index.html
          # GitHub Pages serves 404.html for unmatched routes — use it as SPA fallback
          cp build/200.html build/404.html

      - name: Verify build output
        run: test -f build/index.html && echo "Build OK" || (echo "Build failed — no index.html" && exit 1)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
